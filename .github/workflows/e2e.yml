name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_CI }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_CI }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_CI }}

      - name: Start preview server
        run: |
          npm run preview -- --port 4173 &
          echo $! > .preview.pid
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_CI }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_CI }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_CI }}

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_USE_RUNNING_SERVER: "1"
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_CI }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_CI }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI }}
          CI: "1"

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop preview server
        if: ${{ always() }}
        run: |
          if [ -f .preview.pid ]; then
            kill "$(cat .preview.pid)" || true
            rm -f .preview.pid
          fi
