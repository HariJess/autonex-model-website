<?xml version="1.0" encoding="UTF-8"?>
<!--
  Twitter / X card variant of og-image.svg (M9, 2026-04-26).
  Same visual language as the 1200×630 base, recentred in a 1200×675 frame
  so the 16:9 ratio Twitter expects for summary_large_image renders without
  letterboxing or crop. Everything below is shifted by +23px (= (675-630)/2)
  to keep the original layout vertically centred in the new viewBox.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="AutoNex — Marketplace automobile à Madagascar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071226"/>
      <stop offset="55%" stop-color="#0D1E3E"/>
      <stop offset="100%" stop-color="#1A3560"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Decorative diagonal accent (shifted +23 vs base) -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1" fill="none">
    <line x1="0" y1="563" x2="1200" y2="243"/>
    <line x1="0" y1="603" x2="1200" y2="283"/>
    <line x1="0" y1="643" x2="1200" y2="323"/>
  </g>

  <!-- Brand mark: "X" inside subtle circle -->
  <g transform="translate(90 133)">
    <circle cx="56" cy="56" r="56" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="56" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" text-anchor="middle" fill="#FFFFFF">X</text>
  </g>

  <!-- Wordmark -->
  <text x="90" y="393" font-family="Georgia, 'Times New Roman', serif" font-size="168" font-weight="700" letter-spacing="-3" fill="#FFFFFF">AutoNex</text>

  <!-- Subtitle -->
  <text x="92" y="461" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="400" fill="#FFFFFF" fill-opacity="0.85">Marketplace automobile à Madagascar</text>

  <!-- Footer URL -->
  <text x="90" y="583" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#FFFFFF" fill-opacity="0.55" letter-spacing="2">AUTONEX.MG</text>

  <!-- Top-right tag -->
  <g transform="translate(1010 113)">
    <rect x="0" y="0" width="110" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.30"/>
    <text x="55" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#FFFFFF">BETA</text>
  </g>
</svg>
